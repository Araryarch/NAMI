name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            artifact: nami-linux-x64
          - os: macos-latest
            platform: darwin-x64
            artifact: nami-macos-x64
          - os: macos-latest
            platform: darwin-arm64
            artifact: nami-macos-arm64
          - os: windows-latest
            platform: win-x64
            artifact: nami-windows-x64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build TypeScript
        run: bun run build

      - name: Create standalone executable
        run: |
          bun build lib/cli.js --compile --outfile ${{ matrix.artifact }}
        shell: bash

      - name: Test executable (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x ${{ matrix.artifact }}
          ./${{ matrix.artifact }} --version

      - name: Test executable (Windows)
        if: runner.os == 'Windows'
        run: |
          .\${{ matrix.artifact }} --version

      - name: Create tarball (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          tar -czf dist/${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }} runtime/
          
      - name: Create zip (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          Compress-Archive -Path ${{ matrix.artifact }},runtime -DestinationPath dist/${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## NAMI Language Release
            
            ### Installation
            
            #### Linux / macOS
            ```bash
            # Download and extract
            tar -xzf nami-<platform>.tar.gz
            
            # Move to PATH
            sudo mv nami-<platform> /usr/local/bin/nami
            
            # Test
            nami --version
            ```
            
            #### Windows
            ```powershell
            # Extract zip
            # Add to PATH or run directly
            .\nami-windows-x64.exe --version
            ```
            
            ### Quick Start
            ```bash
            # Create hello.nm
            echo 'println("Hello, NAMI!");' > hello.nm
            
            # Run it
            nami run hello.nm
            ```
            
            ### What's Included
            - Standalone executable (no dependencies needed)
            - C runtime library
            - Full compiler toolchain
            
            ### Requirements
            - GCC or Clang (for compiling generated C code)
            - No other dependencies!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
