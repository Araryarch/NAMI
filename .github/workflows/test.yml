name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Run unit tests
        run: bun test

      - name: Link CLI
        run: bun link

      - name: Install GCC (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Install GCC (macOS)
        if: runner.os == 'macOS'
        run: |
          # Xcode command line tools should already be installed
          gcc --version || xcode-select --install

      - name: Install GCC (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install mingw -y
          refreshenv

      - name: Test CLI
        run: |
          nami --version
          nami --help

      - name: Run example tests (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x test-examples.sh
          ./test-examples.sh || true

      - name: Check features (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x check-features.sh
          ./check-features.sh

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run ESLint
        run: bun run lint

      - name: Check formatting
        run: bun run format:check
