name: VSCode Extension

on:
  push:
    tags:
      - 'vscode-v*'
  workflow_dispatch:

jobs:
  build:
    name: Build VSCode Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm install

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        working-directory: vscode-extension
        run: vsce package

      - name: Get version
        id: version
        working-directory: vscode-extension
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: vscode-extension/*.vsix
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: vscode-extension
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.vsix
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## NAMI VSCode Extension Release
            
            ### Installation
            
            1. Download the `.vsix` file
            2. Open VSCode
            3. Go to Extensions (Ctrl+Shift+X)
            4. Click "..." menu → "Install from VSIX..."
            5. Select the downloaded file
            
            ### Features
            
            - Syntax highlighting for NAMI language
            - Code snippets for common patterns
            - Auto-closing brackets and quotes
            - Comment toggling
            - Bracket matching
            - Code folding
            - NAMI Dark theme
            
            ### Usage
            
            Once installed, `.nm` files will automatically use NAMI syntax highlighting.
            
            Type snippet prefixes (like `func`, `if`, `for`) and press Tab for quick code insertion.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to Marketplace
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref, 'beta')
    # Only run if VSCE_TOKEN secret is set
    # To publish: Add VSCE_TOKEN secret to repository

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm install

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish to Marketplace
        if: env.VSCE_TOKEN != ''
        working-directory: vscode-extension
        run: vsce publish -p ${{ secrets.VSCE_TOKEN }}
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
